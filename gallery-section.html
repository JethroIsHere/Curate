<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <title>curate.</title>
    <link rel="stylesheet" href="gallery-section.css">
</head>
<body>
    <nav class="mobile-navbar main-navbar">
        <button class="nav-btn mobile-element" aria-label="Open Menu">
            <img src="icon_images/menu.png" alt="Menu Icon" class="nav-icon">
        </button>

        <div class="logo-container">
            <a href="#">
                <img src="icon_images/curate_logo.svg" alt="Curate Logo" class="nav-logo">
            </a>
        </div>

        <button class="nav-btn mobile-element" aria-label="Search Gallery">
            <img src="icon_images/search.png" alt="Search Icon" class="nav-icon">
        </button>

        <div class="desktop-search desktop-element">
            <img src="icon_images/search.png" alt="Search Icon" class="search-icon-small">
            <input type="text" placeholder="Find an artwork or artist...">
        </div>

        <div class="desktop-nav desktop-element">
            <a href="hero-section.html" class="nav-link">Home</a>
            <a href="#" class="nav-link active">Gallery</a>
            <a href="#about" class="nav-link">About Us</a>
        </div>
    </nav>
    
    <section class="gallery-container">
    <img src="art_images/home-art-bg.jpg" alt="Hero Background" class="gallery-layer bg-image">

    <div class="gallery-layer bg-gradient-linear"></div>
    
    <div class="gallery-layer bg-vignette"></div>

    <div class="gallery-top-container">
            
            <h2 class="gallery-title">
                <span class="mono-text">The</span> Gallery
            </h2>
            <p class="gallery-subheadline">Explore, Immerse, Ask, Gain Insights.</p>
            
            <div class="category-carousel">
                
                <div class="category-item">
                    <div class="category-image-wrapper">
                        <img src="art_images/The_Swing.jpg" alt="Rococo">
                    </div>
                    <span class="category-label">Rococo</span>
                </div>

                <div class="category-item">
                    <div class="category-image-wrapper">
                        <img src="art_images/The_Lady_with_an_Ermine.jpg" alt="Renaissance">
                    </div>
                    <span class="category-label">Renaissance</span>
                </div>

                <div class="category-item">
                    <div class="category-image-wrapper">
                        <img src="art_images/Persistence_of_Memory.jpg" alt="Surrealism">
                    </div>
                    <span class="category-label">Surrealism</span>
                </div>

                <div class="category-item">
                    <div class="category-image-wrapper">
                        <img src="art_images/The_Gleaners.jpg" alt="Realism">
                    </div>
                    <span class="category-label">Realism</span>
                </div>

                <div class="category-item">
                    <div class="category-image-wrapper">
                        <img src="art_images/Liberty_Leading_the_People.jpg" alt="Romanticism">
                    </div>
                    <span class="category-label">Romanticism</span>
                </div>

            </div>

            <div class="gallery-divider">
                <img src="art_images/white-star.png" alt="Star Icon" class="center-star">
            </div>

        </div>

    </section>
</body>
</html>
<script src="gallery-section.js"></script>
